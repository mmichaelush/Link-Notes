<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>מקשר הערות אוטומטי</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --ok:#16a34a;
      --warn:#f59e0b;
      --err:#ef4444;
      --shadow:0 10px 24px rgba(17,24,39,.08);
      --radius:16px;
      --panelBg:#eef2ff;
      --panelBorder:#c7d2fe;
      --panelShadow:0 10px 22px rgba(37,99,235,.10);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      padding:24px;
      line-height:1.55;
    }

    .wrap{max-width:980px;margin:0 auto}

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
      text-align:center;
    }

    .heroTitleRow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      direction:ltr;
      margin-bottom:6px;
    }

    .heroTitleRow h1{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:.2px;
      direction:rtl;
    }

    .heroTitleRow .icon{
      width:36px;height:36px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fbfbfd;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;
      box-shadow:0 6px 14px rgba(17,24,39,.06);
      flex:0 0 auto;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:13.5px;
      max-width:860px;
      margin-inline:auto;
    }

    .hero a{
      color:var(--accent);
      text-decoration:none;
      font-weight:800;
    }

    .hero a:hover{ text-decoration:underline; }
    .hero a.smallLink{ font-size:12.5px; font-weight:900; }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .hd{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .hd b{font-size:13px}
    .bd{padding:18px}

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .row + .row{margin-top:12px}
    .row.center{justify-content:center;text-align:center}
    .row.stackOnMobile{justify-content:center}

    @media (max-width:560px){
      .row.stackOnMobile > *{flex:1 1 100%}
      .row.stackOnMobile button{width:100%;justify-content:center}
      input[type="text"]{min-width:0;width:100%}
      .rightTools{width:100%;justify-content:center}
      .hero{padding:16px 14px}
      .heroTitleRow h1{font-size:24px}
    }

    .hint{color:var(--muted);font-size:12px}

    button{
      cursor:pointer;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      transition:background .15s ease,border-color .15s ease,transform .06s ease,box-shadow .15s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
      font-weight:650;
    }

    button:hover{
      background:#f9fafb;
      border-color:#d1d5db;
      box-shadow:0 6px 14px rgba(17,24,39,.06);
    }

    button:active{transform:translateY(1px)}
    button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .primary:hover{background:var(--accent2);border-color:var(--accent2)}
    .ghost{background:#fff}

    .rightTools{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input[type="text"]{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      min-width:320px;
      outline:none;
    }

    input[type="text"]:focus{
      border-color:rgba(37,99,235,.5);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    .miniPanel{
      width:100%;
      max-width:920px;
      margin-inline:auto;
      border:1px solid var(--panelBorder);
      border-radius:18px;
      background:var(--panelBg);
      box-shadow:var(--panelShadow);
      padding:18px 16px;
    }

    .miniPanel .ttl{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-bottom:14px;
      color:#111827;
      font-size:16px;
      font-weight:950;
      letter-spacing:.2px;
    }

    .miniGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:end;
    }

    @media (max-width:700px){
      .miniGrid{grid-template-columns:1fr}
    }

    .fRow{
      display:flex;
      flex-direction:column;
      gap:6px;
      text-align:right;
    }

    .fRow label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .fRow input{
      min-width:0;
      width:100%;
      background:#ffffffcc;
    }

    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace
    }

    .status{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-size:12.5px;
      color:var(--muted);
      justify-content:center;
      text-align:center;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#d1d5db;
    }

    .ok .dot{background:var(--ok)}
    .warn .dot{background:var(--warn)}
    .err .dot{background:var(--err)}

    .statusWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:4px;
    }

    pre{
      margin:0;
      padding:14px 14px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#0b1020;
      color:#e5e7eb;
      white-space:pre-wrap;
      word-break:break-word;
      max-height:520px;
      overflow:auto;
      font-size:12.5px;
      direction:ltr;
      text-align:left;
    }

    .toast{
      position:fixed;
      inset-inline-start:24px;
      bottom:24px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow);
      color:var(--text);
      opacity:0;
      transform:translateY(8px);
      transition:opacity .18s ease,transform .18s ease;
      pointer-events:none;
      font-size:13px;
      max-width:min(92vw,520px);
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <div class="heroTitleRow">
        <div class="icon" aria-hidden="true">🔗</div>
        <h1>מקשר הערות אוטומטי</h1>
      </div>
      <p>
        מזהה ומקשר הערות בצורה אוטומטית בין קבצי הספר לקבצי ההערות, עבור
        <a class="smallLink" href="https://www.otzaria.org/" target="_blank" rel="noopener noreferrer">תוכנת אוצריא</a>
      </p>
    </div>

    <div class="grid">
      <section class="card">
        <div class="hd"><b>קלט</b></div>
        <div class="bd">
          <div class="row center stackOnMobile">
            <button id="btnBook" class="primary">📘 יבוא קובץ הספר</button>
            <input id="fileBook" type="file" accept=".txt,text/plain" hidden />

            <button id="btnNotes" class="primary">📝 יבוא קובץ ההערות</button>
            <input id="fileNotes" type="file" accept=".txt,text/plain" hidden />
          </div>

          <div class="statusWrap">
            <div id="bookStatus" class="status"><span class="dot"></span><span>ספר: לא נטען</span></div>
            <span class="hint">|</span>
            <div id="notesStatus" class="status"><span class="dot"></span><span>הערות: לא נטען</span></div>
          </div>

          <div class="miniPanel" style="margin-top:14px">
            <div class="ttl">⚙️ הגדרות</div>

            <div class="miniGrid">
              <div class="fRow">
                <label for="tagBook">תג בספר (ברירת מחדל: <span class="mono">sup</span>)</label>
                <input id="tagBook" type="text" value="sup" spellcheck="false" autocomplete="off" />
              </div>

              <div class="fRow">
                <label for="tagNotes">תג בהערות (ברירת מחדל: <span class="mono">sup</span>)</label>
                <input id="tagNotes" type="text" value="sup" spellcheck="false" autocomplete="off" />
              </div>

              <div class="fRow">
                <label for="heRef2"><span class="mono">heRef_2</span> (כותרת ההערה)</label>
                <input id="heRef2" type="text" value="הערות" spellcheck="false" autocomplete="off" />
              </div>

              <div class="fRow" style="grid-column:1 / -1">
                <label for="path2">path_2 (שם הקובץ / נתיב ב):</label>
                <input id="path2" type="text" value="" spellcheck="false" autocomplete="off" placeholder="שם קובץ ההערות" />
                <div class="hint" style="margin-top:2px">ברירת מחדל: שם קובץ ההערות שנטען</div>
              </div>
            </div>
          </div>

          <div class="row center stackOnMobile" style="margin-top:14px">
            <button id="btnMake" disabled>⚙️ יצירת ה-JSON</button>
          </div>

          <div class="row center" style="margin-top:10px">
            <div id="makeStatus" class="status">
              <span class="dot"></span>
              <span>טען קבצים כדי להתחיל</span>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="hd">
          <b>פלט</b>
          <div class="rightTools">
            <button id="btnCopy" class="ghost" disabled>📋 העתקת JSON</button>
            <button id="btnDownload" disabled>⬇️ הורדת JSON</button>
          </div>
        </div>
        <div class="bd">
          <pre id="out">[]</pre>
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  "use strict";

  const els = {
    btnBook: document.getElementById("btnBook"),
    btnNotes: document.getElementById("btnNotes"),
    fileBook: document.getElementById("fileBook"),
    fileNotes: document.getElementById("fileNotes"),
    bookStatus: document.getElementById("bookStatus"),
    notesStatus: document.getElementById("notesStatus"),
    btnMake: document.getElementById("btnMake"),
    btnDownload: document.getElementById("btnDownload"),
    btnCopy: document.getElementById("btnCopy"),
    out: document.getElementById("out"),
    path2: document.getElementById("path2"),
    tagBook: document.getElementById("tagBook"),
    tagNotes: document.getElementById("tagNotes"),
    heRef2: document.getElementById("heRef2"),
    makeStatus: document.getElementById("makeStatus"),
    toast: document.getElementById("toast"),
  };

  const state = {
    bookText: "",
    notesText: "",
    bookBaseName: "שם הספר",
    notesFileName: "",
    lastJsonText: "[]",
  };

  const logger = (() => {
    const ns = "🔗 מקשר הערות אוטומטי";
    const time = () => new Date().toLocaleTimeString("he-IL", { hour12: false });

    const chip = "padding:2px 8px;border-radius:999px;font-weight:900;letter-spacing:.2px";
    const styles = {
      ns:   `${chip};background:#111827;color:#fff`,
      ok:   `${chip};background:#16a34a;color:#fff`,
      warn: `${chip};background:#f59e0b;color:#111827`,
      err:  `${chip};background:#ef4444;color:#fff`,
      info: `${chip};background:#2563eb;color:#fff`,
      dim:  "color:#6b7280;font-weight:700",
      msg:  "color:#111827;font-weight:800"
    };

    function label(level) {
      if (level === "ok") return "הצלחה";
      if (level === "warn") return "אזהרה";
      if (level === "err") return "שגיאה";
      return "מידע";
    }

    function line(level, message, data) {
      const levelStyle =
        level === "ok"   ? styles.ok   :
        level === "warn" ? styles.warn :
        level === "err"  ? styles.err  :
                           styles.info;

      const head = `%c${ns}%c ${label(level)}%c ${time()}%c ${message}`;
      if (data !== undefined) {
        console.log(head, styles.ns, levelStyle, styles.dim, styles.msg, data);
      } else {
        console.log(head, styles.ns, levelStyle, styles.dim, styles.msg);
      }
    }

    function group(title, data, collapsed = true) {
      const open = collapsed ? console.groupCollapsed : console.group;
      open(`%c${ns} · ${title}`, "color:#2563eb;font-weight:900");
      if (data !== undefined) console.log(data);
      console.groupEnd();
    }

    return {
      ok:   (m, d) => line("ok", m, d),
      warn: (m, d) => line("warn", m, d),
      err:  (m, d) => line("err", m, d),
      info: (m, d) => line("info", m, d),
      group
    };
  })();

  function setStatus(rootEl, text, cls) {
    rootEl.className = "status" + (cls ? (" " + cls) : "");
    const spanText = rootEl.querySelector("span:last-child");
    if (spanText) spanText.textContent = text;
  }

  let toastTimer = null;
  function showToast(msg) {
    els.toast.textContent = msg;
    els.toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
  }

  function updateButtons() {
    const ready = state.bookText.trim().length > 0 && state.notesText.trim().length > 0;
    els.btnMake.disabled = !ready;
  }

  function readFileAsText(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onerror = () => reject(new Error("שגיאה בקריאת הקובץ"));
      fr.onload = () => resolve(String(fr.result || ""));
      fr.readAsText(file);
    });
  }

  function normalizeNewlines(s) {
    return String(s || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  }

  function splitToLines(s) {
    return normalizeNewlines(s).split("\n");
  }

  function safeFileStem(name) {
    let stem = String(name || "").trim();
    stem = stem.replace(/\.[^/.\\]+$/g, "");
    stem = stem.replace(/[<>:"/\\|?*\u0000-\u001F]/g, "");
    stem = stem.replace(/\s+/g, " ").trim();
    return stem || "שם הספר";
  }

  function sanitizeTagName(raw) {
    let t = String(raw || "").trim();
    t = t.replace(/[<>\s/]/g, "");
    t = t.replace(/[^a-zA-Z0-9:_-]/g, "");
    return t || "";
  }

  function uniqSortedNumbers(arr) {
    return Array.from(new Set(arr)).sort((a, b) => a - b);
  }

  function summarizeLineNumbers(items, lineKey = "lineIndex", max = 20) {
    const lines = items
      .map(x => x && x[lineKey])
      .filter(x => Number.isInteger(x));

    const uniq = Array.from(new Set(lines)).sort((a, b) => a - b);
    if (!uniq.length) return "ללא שורות";

    const shown = uniq.slice(0, max).join(", ");
    return uniq.length > max ? `${shown} ... (+${uniq.length - max} נוספות)` : shown;
  }

  function downloadText(filename, text) {
    const blob = new Blob([text], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1200);
  }

  function stripWrapperChars(token) {
    let out = String(token || "").trim();
    const wrapperChars = `"'״׳()[]{}<>«»`;
    while (out.length >= 2 && wrapperChars.includes(out[0]) && wrapperChars.includes(out[out.length - 1])) {
      out = out.slice(1, -1).trim();
    }
    return out;
  }

  function normalizeRefToken(rawToken) {
    let token = String(rawToken || "");
    token = token.replace(/\u200e|\u200f|\u202a|\u202b|\u202c|\u202d|\u202e/g, "");
    token = token.replace(/\s+/g, "");
    token = stripWrapperChars(token);

    if (!token) return null;

    const m = token.match(/([^\d]*)(\d+)([^\d]*)/);
    if (!m) return null;

    const prefix = m[1] || "";
    const digits = m[2] || "";
    const suffix = m[3] || "";

    const num = parseInt(digits, 10);
    if (!Number.isFinite(num)) return null;

    const key = `${prefix}${num}${suffix}`;
    const hasDecoration = (prefix + suffix).length > 0;

    return {
      key,
      num,
      prefix,
      suffix,
      hasDecoration,
      raw: token
    };
  }

  function isPlainNumericKey(key) {
    return /^\d+$/.test(String(key || ""));
  }

  function extractRefsFromLineByTag(line, tagName) {
    const tag = sanitizeTagName(tagName);
    if (!tag) return [];

    const openRe = new RegExp(`<\\s*${tag}\\b[^>]*>`, "gi");
    const closeAnyRe = new RegExp(`<\\s*\\/\\s*${tag}\\s*>`, "i");

    const refs = [];
    let m;

    while ((m = openRe.exec(line)) !== null) {
      const openEnd = openRe.lastIndex;
      const tail = line.slice(openEnd);

      const closeMatch = tail.match(closeAnyRe);
      const rawInside = closeMatch ? tail.slice(0, closeMatch.index) : tail.slice(0, 220);
      const insidePlain = rawInside.replace(/<[^>]*>/g, " ").trim();

      const tokenMatch = insidePlain.match(/([^\d\s<>\u200e\u200f\u202a-\u202e]*\d+[^\d\s<>\u200e\u200f\u202a-\u202e]*)/);
      if (tokenMatch && tokenMatch[1]) {
        const ref = normalizeRefToken(tokenMatch[1]);
        if (ref) refs.push(ref);
      }

      if (closeMatch) {
        openRe.lastIndex = openEnd + closeMatch.index + closeMatch[0].length;
      }
    }

    return refs;
  }

  function extractOccurrences(lines, tagName, sideName) {
    const out = [];
    let globalIndex = 0;

    for (let i = 0; i < lines.length; i++) {
      const refs = extractRefsFromLineByTag(lines[i], tagName);

      for (let j = 0; j < refs.length; j++) {
        globalIndex += 1;
        out.push({
          key: refs[j].key,
          num: refs[j].num,
          prefix: refs[j].prefix,
          suffix: refs[j].suffix,
          hasDecoration: refs[j].hasDecoration,
          rawRef: refs[j].raw,
          lineIndex: i + 1,
          occurrenceIndex: globalIndex,
          side: sideName,
          rawLine: lines[i]
        });
      }
    }

    return out;
  }

  function splitNotesIntoChapters(noteOccs) {
    if (!noteOccs.length) return [];

    const chapters = [];
    let current = [];

    for (let i = 0; i < noteOccs.length; i++) {
      const occ = noteOccs[i];

      if (current.length > 0 && occ.num === 1 && isPlainNumericKey(occ.key)) {
        chapters.push(current);
        current = [occ];
      } else {
        current.push(occ);
      }
    }

    if (current.length) chapters.push(current);
    return chapters;
  }

  function buildChapterInfo(chapterOccs, chapterNo) {
    const keyToLine = new Map();
    const keyToAllLines = new Map();
    const seenKeys = new Set();
    const dupEntries = [];
    let maxNum = 0;

    for (const occ of chapterOccs) {
      if (!keyToAllLines.has(occ.key)) keyToAllLines.set(occ.key, []);
      keyToAllLines.get(occ.key).push(occ.lineIndex);

      if (seenKeys.has(occ.key)) {
        dupEntries.push({
          chapter: chapterNo,
          key: occ.key,
          num: occ.num,
          prefix: occ.prefix,
          suffix: occ.suffix,
          lineIndex: occ.lineIndex,
          rawLine: occ.rawLine
        });
      }

      seenKeys.add(occ.key);

      if (!keyToLine.has(occ.key)) {
        keyToLine.set(occ.key, occ.lineIndex);
      }

      if (occ.num > maxNum) maxNum = occ.num;
    }

    const dupKeys = Array.from(new Set(dupEntries.map(x => x.key))).sort((a, b) => {
      const an = parseInt(String(a).match(/\d+/)?.[0] || "0", 10);
      const bn = parseInt(String(b).match(/\d+/)?.[0] || "0", 10);
      if (an !== bn) return an - bn;
      return String(a).localeCompare(String(b), "he");
    });

    return {
      chapterNo,
      occs: chapterOccs,
      keyToLine,
      keyToAllLines,
      nums: uniqSortedNumbers(chapterOccs.map(x => x.num)),
      keys: Array.from(new Set(chapterOccs.map(x => x.key))),
      maxNum,
      dupNums: uniqSortedNumbers(dupEntries.map(x => x.num)),
      dupKeys,
      dupEntries,
      firstLine: chapterOccs[0]?.lineIndex || null,
      lastLine: chapterOccs[chapterOccs.length - 1]?.lineIndex || null
    };
  }

  function shouldAdvanceBookChapter({ bookOccs, idx, currentState, activeChapter, nextChapter }) {
    if (!nextChapter) return { advance: false, reason: "" };

    const curr = bookOccs[idx];
    if (!curr) return { advance: false, reason: "" };

    const prev = idx > 0 ? bookOccs[idx - 1] : null;
    const next1 = idx + 1 < bookOccs.length ? bookOccs[idx + 1] : null;
    const next2 = idx + 2 < bookOccs.length ? bookOccs[idx + 2] : null;
    const next3 = idx + 3 < bookOccs.length ? bookOccs[idx + 3] : null;

    const currExistsHere = activeChapter.keyToLine.has(curr.key);
    const currExistsNext = nextChapter.keyToLine.has(curr.key);

    if (
      curr.num === 1 &&
      isPlainNumericKey(curr.key) &&
      currentState.linkedCount >= 2 &&
      currentState.maxSeen >= 3 &&
      prev &&
      prev.key !== "1"
    ) {
      const future = [next1?.key, next2?.key, next3?.key].filter(Boolean);
      const hasPlain2 = future.includes("2");
      const hasPlain3 = future.includes("3");

      if (hasPlain2 || hasPlain3) {
        return { advance: true, reason: "איפוס מספור קלאסי בספר" };
      }
    }

    if (
      prev &&
      prev.num >= 5 &&
      curr.num <= 3 &&
      currentState.maxSeen >= 5 &&
      !currExistsHere &&
      currExistsNext
    ) {
      return { advance: true, reason: "נפילת מספור חדה והמספר נמצא רק בפרק הבא" };
    }

    if (
      currentState.linkedCount >= 3 &&
      !currExistsHere &&
      currExistsNext
    ) {
      return { advance: true, reason: "המזהה לא קיים בפרק הנוכחי אך קיים בפרק הבא" };
    }

    return { advance: false, reason: "" };
  }

  function buildLinks({ bookOccs, noteChapterInfos, heRef2, path2 }) {
    const outArr = [];
    const missingInNotes = [];
    const chapterTransitions = [];

    if (!bookOccs.length || !noteChapterInfos.length) {
      return {
        outArr,
        missingInNotes,
        chapterTransitions,
        linkedRepeats: 0,
        bookChaptersUsed: noteChapterInfos.length ? 1 : 0
      };
    }

    let activeChapterIdx = 0;
    let linkedRepeats = 0;

    const seenKeysInCurrentBookChapter = new Map();
    let currentBookChapterState = {
      linkedCount: 0,
      maxSeen: 0,
      missesInRow: 0
    };

    function moveToNextBookChapter(reason, occ) {
      chapterTransitions.push({
        fromChapter: activeChapterIdx + 1,
        toChapter: activeChapterIdx + 2,
        atBookLine: occ.lineIndex,
        key: occ.key,
        num: occ.num,
        reason
      });

      logger.info(`מעבר מפרק ${activeChapterIdx + 1} לפרק ${activeChapterIdx + 2}`, {
        סיבה: reason,
        שורת_ספר: occ.lineIndex,
        מזהה: occ.key
      });

      activeChapterIdx += 1;
      seenKeysInCurrentBookChapter.clear();
      currentBookChapterState = {
        linkedCount: 0,
        maxSeen: 0,
        missesInRow: 0
      };
    }

    for (let i = 0; i < bookOccs.length; i++) {
      const occ = bookOccs[i];
      const activeChapter = noteChapterInfos[activeChapterIdx];
      const nextChapter = noteChapterInfos[activeChapterIdx + 1];

      const decision = shouldAdvanceBookChapter({
        bookOccs,
        idx: i,
        currentState: currentBookChapterState,
        activeChapter,
        nextChapter
      });

      if (decision.advance) {
        moveToNextBookChapter(decision.reason, occ);
      }

      const currentChapter = noteChapterInfos[activeChapterIdx];
      let noteLine = currentChapter ? currentChapter.keyToLine.get(occ.key) : undefined;

      if (!noteLine && activeChapterIdx < noteChapterInfos.length - 1) {
        const next = noteChapterInfos[activeChapterIdx + 1];
        const existsInNext = next.keyToLine.has(occ.key);

        if (
          existsInNext &&
          (
            currentBookChapterState.missesInRow >= 2 ||
            (occ.num <= 3 && currentBookChapterState.maxSeen >= 5) ||
            (occ.key === "1" && currentBookChapterState.linkedCount >= 3)
          )
        ) {
          moveToNextBookChapter("מעבר הצלה לאחר פספוסים", occ);
          noteLine = noteChapterInfos[activeChapterIdx].keyToLine.get(occ.key);
        }
      }

      if (noteLine) {
        outArr.push({
          "line_index_1": occ.lineIndex,
          "heRef_2": heRef2,
          "path_2": path2,
          "line_index_2": noteLine,
          "Conection Type": "commentary"
        });

        const prevCount = seenKeysInCurrentBookChapter.get(occ.key) || 0;
        if (prevCount >= 1) linkedRepeats += 1;
        seenKeysInCurrentBookChapter.set(occ.key, prevCount + 1);

        currentBookChapterState.linkedCount += 1;
        currentBookChapterState.missesInRow = 0;

        if (occ.num > currentBookChapterState.maxSeen) {
          currentBookChapterState.maxSeen = occ.num;
        }
      } else {
        currentBookChapterState.missesInRow += 1;

        missingInNotes.push({
          chapter: activeChapterIdx + 1,
          key: occ.key,
          num: occ.num,
          lineIndex: occ.lineIndex,
          occurrenceIndex: occ.occurrenceIndex,
          rawLine: occ.rawLine,
          missesInRow: currentBookChapterState.missesInRow
        });
      }
    }

    return {
      outArr,
      missingInNotes,
      chapterTransitions,
      linkedRepeats,
      bookChaptersUsed: activeChapterIdx + 1
    };
  }

  function collectMissingInBook(noteChapterInfos, bookOccs) {
    const keysInBook = new Set(bookOccs.map(x => x.key));
    const missingInBook = [];

    for (const chapterInfo of noteChapterInfos) {
      for (const key of chapterInfo.keys) {
        if (!keysInBook.has(key)) {
          const lines = chapterInfo.keyToAllLines.get(key) || [];
          missingInBook.push({
            chapter: chapterInfo.chapterNo,
            key,
            num: parseInt(String(key).match(/\d+/)?.[0] || "0", 10),
            lineIndex: lines[0] || null,
            allLines: lines
          });
        }
      }
    }

    return missingInBook;
  }

  function reportDuplicateNotes(noteChapterInfos) {
    const chaptersWithDup = noteChapterInfos.filter(ch => ch.dupEntries.length > 0);
    if (!chaptersWithDup.length) return;

    const detailed = chaptersWithDup.map(ch => ({
      chapter: ch.chapterNo,
      linesRange: `${ch.firstLine} - ${ch.lastLine}`,
      duplicateKeys: ch.dupKeys,
      duplicateLines: ch.dupEntries.map(x => ({
        key: x.key,
        line: x.lineIndex
      }))
    }));

    logger.warn(
      "נמצאו כפילויות מזהים בתוך פרק בקובץ ההערות. זה חריג ועשוי להעיד על קלט לא נקי.",
      detailed
    );
  }

  function reportLinkingResult(info) {
    const {
      outCount,
      tagBook,
      tagNotes,
      totalBookMarks,
      totalNotesMarks,
      notesChaptersCount,
      bookChaptersUsed,
      missingInBook,
      missingInNotes,
      linkedRepeats,
      chapterTransitions,
      noteChapterInfos
    } = info;

    if (outCount > 0) {
      const warnParts = [];

      if (missingInBook.length) {
        warnParts.push(
          `מזהים שמופיעים בהערות אך לא נמצאו בספר: ${missingInBook.length} (שורות בהערות: ${summarizeLineNumbers(missingInBook)})`
        );
      }

      if (missingInNotes.length) {
        warnParts.push(
          `מופעים בספר שלא קיבלו התאמה בהערות: ${missingInNotes.length} (שורות בספר: ${summarizeLineNumbers(missingInNotes)})`
        );
      }

      const dupCount = noteChapterInfos.reduce((sum, ch) => sum + ch.dupEntries.length, 0);
      if (dupCount > 0) {
        const dupEntriesFlat = noteChapterInfos.flatMap(ch => ch.dupEntries);
        warnParts.push(
          `כפילויות בהערות: ${dupCount} (שורות בהערות: ${summarizeLineNumbers(dupEntriesFlat)})`
        );
      }

      if (linkedRepeats > 0) {
        warnParts.push(`חזרות שקושרו בספר: ${linkedRepeats}`);
      }

      if (warnParts.length) {
        setStatus(els.makeStatus, `נוצרו ${outCount} קישורים. שים לב: ${warnParts.join(" · ")}.`, "warn");
      } else {
        setStatus(els.makeStatus, `נוצרו ${outCount} קישורים בהצלחה.`, "ok");
      }
    } else {
      if (totalBookMarks === 0 && totalNotesMarks === 0) {
        setStatus(els.makeStatus, "לא נוצרו קישורים: לא זוהו מספרי הערות באף אחד מהקבצים. בדוק את תגי הזיהוי.", "err");
      } else if (totalBookMarks === 0) {
        setStatus(els.makeStatus, `לא נוצרו קישורים: לא זוהו מספרי הערות בקובץ הספר לפי <${tagBook}>.`, "err");
      } else if (totalNotesMarks === 0) {
        setStatus(els.makeStatus, `לא נוצרו קישורים: לא זוהו מספרי הערות בקובץ ההערות לפי <${tagNotes}>.`, "err");
      } else {
        setStatus(els.makeStatus, "לא נוצרו קישורים: נמצאו מספרי הערות, אך לא נמצאו התאמות תקינות בין הספר להערות.", "err");
      }
    }

    logger.group("סיכום ריצה", {
      תג_בספר: `<${tagBook}>`,
      תג_בהערות: `<${tagNotes}>`,
      מופעים_בספר: totalBookMarks,
      מופעים_בהערות: totalNotesMarks,
      פרקים_שזוהו_בהערות: notesChaptersCount,
      פרקים_ששומשו_בספר: bookChaptersUsed,
      קישורים_שנוצרו: outCount,
      חזרות_שקושרו: linkedRepeats,
      מופעים_שדולגו_בספר: missingInNotes.length,
      מזהים_שחסרים_בספר: missingInBook.length
    });

    if (outCount > 0) {
      logger.ok(`נוצרו ${outCount} קישורים.`, {
        פרקים_בהערות: notesChaptersCount,
        פרקים_בשימוש_בספר: bookChaptersUsed,
        חזרות_שקושרו: linkedRepeats
      });
    }

    if (chapterTransitions.length) {
      logger.group("מעברי פרקים שזוהו בספר", chapterTransitions, false);
    }

    if (missingInBook.length) {
      logger.warn(
        `דילוג: ${missingInBook.length} מזהים הופיעו בהערות אך לא נמצאו בספר.`,
        {
          שורות_בהערות: summarizeLineNumbers(missingInBook),
          דוגמאות: missingInBook.slice(0, 30).map(x => ({
            chapter: x.chapter,
            key: x.key,
            line: x.lineIndex
          }))
        }
      );
    }

    if (missingInNotes.length) {
      logger.warn(
        `דילוג: ${missingInNotes.length} מופעים בספר לא קיבלו התאמה בהערות.`,
        {
          שורות_בספר: summarizeLineNumbers(missingInNotes),
          דוגמאות: missingInNotes.slice(0, 30).map(x => ({
            chapter: x.chapter,
            key: x.key,
            line: x.lineIndex,
            occurrence: x.occurrenceIndex
          }))
        }
      );
    }

    reportDuplicateNotes(noteChapterInfos);

    if (outCount === 0) {
      logger.err("לא נוצרו קישורים.");
    }
  }

  async function handleBookFileChange() {
    const f = els.fileBook.files && els.fileBook.files[0];
    if (!f) return;

    try {
      state.bookText = await readFileAsText(f);
      state.bookBaseName = safeFileStem(f.name);

      setStatus(els.bookStatus, `ספר: נטען (${f.name})`, "ok");
      showToast("קובץ הספר נטען");

      logger.ok(`קובץ הספר נטען: ${f.name}`, {
        שורות: splitToLines(state.bookText).length,
        תווים: state.bookText.length
      });
    } catch (e) {
      state.bookText = "";
      state.bookBaseName = "שם הספר";
      setStatus(els.bookStatus, "ספר: שגיאה בטעינה", "err");
      logger.err("טעינת קובץ הספר נכשלה.", e);
      alert("שגיאה בקריאת קובץ הספר");
    }

    updateButtons();
  }

  async function handleNotesFileChange() {
    const f = els.fileNotes.files && els.fileNotes.files[0];
    if (!f) return;

    try {
      state.notesText = await readFileAsText(f);
      state.notesFileName = f.name;
      els.path2.value = f.name;

      setStatus(els.notesStatus, `הערות: נטען (${f.name})`, "ok");
      showToast("קובץ ההערות נטען");

      logger.ok(`קובץ ההערות נטען: ${f.name}`, {
        שורות: splitToLines(state.notesText).length,
        תווים: state.notesText.length
      });
    } catch (e) {
      state.notesText = "";
      state.notesFileName = "";
      setStatus(els.notesStatus, "הערות: שגיאה בטעינה", "err");
      logger.err("טעינת קובץ ההערות נכשלה.", e);
      alert("שגיאה בקריאת קובץ ההערות");
    }

    updateButtons();
  }

  function makeJson() {
    els.btnDownload.disabled = true;
    els.btnCopy.disabled = true;

    const bookLines = splitToLines(state.bookText);
    const noteLines = splitToLines(state.notesText);

    const tagBook = sanitizeTagName(els.tagBook.value) || "sup";
    const tagNotes = sanitizeTagName(els.tagNotes.value) || "sup";
    els.tagBook.value = tagBook;
    els.tagNotes.value = tagNotes;

    const heRef2 = String(els.heRef2.value || "").trim() || "הערות";
    els.heRef2.value = heRef2;

    let path2 = String(els.path2.value || "").trim();
    if (!path2 && state.notesFileName) path2 = state.notesFileName;
    els.path2.value = path2;

    logger.info("מתחיל תהליך זיהוי וקישור", {
      תג_בספר: tagBook,
      תג_בהערות: tagNotes,
      heRef_2: heRef2,
      path_2: path2
    });

    const bookOccs = extractOccurrences(bookLines, tagBook, "book");
    const noteOccs = extractOccurrences(noteLines, tagNotes, "notes");

    logger.info("זוהו מופעים ראשוניים", {
      מופעים_בספר: bookOccs.length,
      מופעים_בהערות: noteOccs.length
    });

    const noteChaptersRaw = splitNotesIntoChapters(noteOccs);
    const noteChapterInfos = noteChaptersRaw.map((chapter, idx) => buildChapterInfo(chapter, idx + 1));

    logger.group("פרקי הערות שזוהו", noteChapterInfos.map(ch => ({
      chapter: ch.chapterNo,
      fromLine: ch.firstLine,
      toLine: ch.lastLine,
      occurrences: ch.occs.length,
      maxNum: ch.maxNum,
      duplicateKeys: ch.dupKeys
    })));

    const missingInBook = collectMissingInBook(noteChapterInfos, bookOccs);

    const {
      outArr,
      missingInNotes,
      chapterTransitions,
      linkedRepeats,
      bookChaptersUsed
    } = buildLinks({
      bookOccs,
      noteChapterInfos,
      heRef2,
      path2
    });

    state.lastJsonText = JSON.stringify(outArr, null, 2);
    els.out.textContent = state.lastJsonText;

    reportLinkingResult({
      outCount: outArr.length,
      tagBook,
      tagNotes,
      totalBookMarks: bookOccs.length,
      totalNotesMarks: noteOccs.length,
      notesChaptersCount: noteChapterInfos.length,
      bookChaptersUsed,
      missingInBook,
      missingInNotes,
      linkedRepeats,
      chapterTransitions,
      noteChapterInfos
    });

    els.btnDownload.disabled = (outArr.length === 0);
    els.btnCopy.disabled = (outArr.length === 0);

    showToast(outArr.length ? "ה-JSON נוצר" : "לא נוצרו קישורים");
  }

  function downloadJson() {
    const filename = `${state.bookBaseName}_links.json`;
    downloadText(filename, state.lastJsonText);
    showToast(`ירד: ${filename}`);
    logger.ok(`הורדת JSON: ${filename}`);
  }

  async function copyJson() {
    try {
      await navigator.clipboard.writeText(state.lastJsonText);
      showToast("הועתק ללוח");
      logger.ok("ה-JSON הועתק ללוח.");
    } catch (e) {
      logger.warn("Clipboard API נכשל. מנסה שיטת גיבוי.", e);

      const ta = document.createElement("textarea");
      ta.value = state.lastJsonText;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();

      try {
        document.execCommand("copy");
        showToast("הועתק ללוח");
        logger.ok("ה-JSON הועתק ללוח בשיטת גיבוי.");
      } catch (e2) {
        logger.err("גם שיטת הגיבוי נכשלה.", e2);
        alert("ההעתקה נכשלה. אפשר להעתיק ידנית מהמסך.");
      } finally {
        ta.remove();
      }
    }
  }

  function init() {
    els.btnBook.addEventListener("click", () => els.fileBook.click());
    els.btnNotes.addEventListener("click", () => els.fileNotes.click());
    els.fileBook.addEventListener("change", handleBookFileChange);
    els.fileNotes.addEventListener("change", handleNotesFileChange);
    els.btnMake.addEventListener("click", makeJson);
    els.btnDownload.addEventListener("click", downloadJson);
    els.btnCopy.addEventListener("click", copyJson);

    setStatus(els.bookStatus, "ספר: לא נטען", "");
    setStatus(els.notesStatus, "הערות: לא נטען", "");
    setStatus(els.makeStatus, "טען קבצים כדי להתחיל", "");

    logger.info("העמוד נטען ומוכן לעבודה.");
    updateButtons();
  }

  init();
})();
</script>
</body>
